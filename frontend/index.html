<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <style>
    /* Inline critical CSS so the page works even if style.css path is wrong */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    :root {
      --bg-primary:#0d1117;--bg-card:#1c2128;--bg-tertiary:#21262d;
      --border-color:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;
      --text-muted:#484f58;--accent-blue:#388bfd;--accent-blue-dim:#1f6feb;
      --accent-purple:#a371f7;--accent-red:#f85149;--accent-green:#3fb950;
      --radius-md:8px;--radius-lg:12px;--radius-xl:16px;
      --shadow-lg:0 8px 24px rgba(0,0,0,.6);--transition:.18s cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:14px}
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .auth-wrapper::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(56,139,253,.08) 0%,transparent 70%);top:-200px;left:-200px;border-radius:50%;pointer-events:none}
    .auth-wrapper::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(163,113,247,.06) 0%,transparent 70%);bottom:-100px;right:-100px;border-radius:50%;pointer-events:none}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-xl);padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:var(--shadow-lg)}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .auth-logo-text{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px}
    .auth-title{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
    .auth-subtitle{color:var(--text-secondary);margin-bottom:28px;font-size:13px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .form-control{display:block;width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:var(--radius-md);padding:10px 14px;font-family:inherit;font-size:14px;transition:border-color var(--transition),box-shadow var(--transition);outline:none}
    .form-control:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(56,139,253,.15)}
    .form-control::placeholder{color:var(--text-muted)}
    .mb-3{margin-bottom:16px}.mb-4{margin-bottom:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:600;font-size:13px;border-radius:var(--radius-md);padding:8px 16px;transition:all var(--transition);border:1px solid transparent;cursor:pointer;text-decoration:none;width:auto}
    .btn-primary{background:var(--accent-blue-dim);border-color:var(--accent-blue);color:#fff}
    .btn-primary:hover{background:var(--accent-blue);box-shadow:0 0 12px rgba(56,139,253,.3)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-lg{padding:12px 24px;font-size:15px}
    .w-100{width:100%}
    .alert-error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--accent-red);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:16px;font-size:13px;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast-notif{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:14px 16px;min-width:280px;max-width:340px;box-shadow:var(--shadow-lg);display:flex;align-items:flex-start;gap:12px;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes toastIn{from{opacity:0;transform:translateX(60px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
    .toast-icon{width:32px;height:32px;border-radius:6px;background:rgba(56,139,253,.15);color:var(--accent-blue);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .toast-icon.success{background:rgba(63,185,80,.15);color:var(--accent-green)}
    .toast-icon.error{background:rgba(248,81,73,.15);color:var(--accent-red)}
    .toast-content{flex:1}
    .toast-title{font-size:13px;font-weight:700;margin-bottom:2px}
    .toast-message{font-size:12px;color:var(--text-secondary)}
  </style>
</head>
<body>

<div id="toast-container"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <span class="auth-logo-text">TaskFlow</span>
    </div>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your workspace</p>

    <div class="alert-error" id="error-alert"></div>

    <div class="mb-3">
      <label class="form-label" for="email">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="mb-4">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-lg w-100" id="login-btn">Sign In</button>

    <div style="margin-top:20px;text-align:center;font-size:13px;color:var(--text-muted)">
      Don't have an account?
      <a href="register.html" style="color:var(--accent-blue);font-weight:600;text-decoration:none;margin-left:4px">Create one</a>
    </div>
  </div>
</div>

<script>
// ─── Inline Toast (no dependency) ─────────────────────────
var Toast = {
  show: function(message, type, title, duration) {
    type = type || 'info'; duration = duration || 4000;
    var icons = {info:'🔔',success:'✅',error:'❌',warning:'⚠️'};
    var titles = {info:'Notification',success:'Success',error:'Error',warning:'Warning'};
    var c = document.getElementById('toast-container');
    if (!c) return;
    var t = document.createElement('div');
    t.className = 'toast-notif';
    t.innerHTML = '<div class="toast-icon '+type+'">'+(icons[type]||'🔔')+'</div>'+
      '<div class="toast-content"><div class="toast-title">'+(title||titles[type])+'</div>'+
      '<div class="toast-message">'+message+'</div></div>';
    c.appendChild(t);
    setTimeout(function(){ t.remove(); }, duration);
  },
  success: function(m,t){ this.show(m,'success',t); },
  error:   function(m,t){ this.show(m,'error',t); },
};

// ─── Minimal API (inline so no external file needed for login) ─
var API_BASE = 'http://localhost:8080/api';
var Api = {
  getToken:   function(){ return localStorage.getItem('jwt_token'); },
  setToken:   function(t){ localStorage.setItem('jwt_token',t); },
  setUser:    function(u){ localStorage.setItem('current_user',JSON.stringify(u)); },
  isAuthenticated: function(){ return !!this.getToken(); },
  login: async function(email, password) {
    try {
      var res = await fetch(API_BASE+'/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email:email, password:password})
      });
      var data = await res.json().catch(function(){ return {}; });
      if (!res.ok) { return {error: data.message || data.error || 'Login failed'}; }
      return data;
    } catch(e) {
      return {error: 'Network error — is the backend running on localhost:8080?'};
    }
  }
};

// Redirect if already authenticated
if (Api.isAuthenticated()) { window.location.href = 'dashboard.html'; }

// ─── Login logic ──────────────────────────────────────────
var loginBtn = document.getElementById('login-btn');
var errorAlert = document.getElementById('error-alert');

function showError(msg) {
  errorAlert.textContent = msg;
  errorAlert.style.display = 'block';
}

function setLoading(on) {
  loginBtn.disabled = on;
  loginBtn.innerHTML = on
    ? '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px"></span>Signing in…'
    : 'Sign In';
}

async function doLogin() {
  errorAlert.style.display = 'none';
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  if (!email || !password) { showError('Please enter your email and password.'); return; }

  setLoading(true);
  var data = await Api.login(email, password);
  setLoading(false);

  if (data && data.error) { showError(data.error); return; }

  if (data && data.token) {
    Api.setToken(data.token);
    if (data.user)      Api.setUser(data.user);
    else if (data.id)   Api.setUser(data);
    Toast.success('Login successful! Redirecting…');
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 700);
  } else {
    showError('Unexpected response from server. Check browser console.');
    console.error('Login response:', data);
  }
}

loginBtn.addEventListener('click', doLogin);
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
