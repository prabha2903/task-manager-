<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Task Detail</title>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">
      <div id="detail-container">
        <div class="loading-spinner"><div class="spinner"></div> Loading task…</div>
      </div>
    </div>
  </div>
</div>

<script src="js/shell.js"></script>
<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/activity.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if (!initPage('tasks', 'Task Detail')) { throw new Error('Not authenticated'); }

  var params = new URLSearchParams(location.search);
  var taskId  = params.get('id');
  if (!taskId) { window.location.href = 'tasks.html'; }

  async function loadDetail() {
    var results = await Promise.all([Api.getTask(taskId), Api.getComments(taskId)]);
    var task = results[0], comments = results[1] || [];
    var container = document.getElementById('detail-container');

    if (!task) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><h6>Task not found</h6><a href="tasks.html" style="color:var(--accent-blue)">← Back to tasks</a></div>';
      return;
    }

    container.innerHTML = [
      '<div style="display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start" id="detail-grid">',

      // ── Left Column ────────────────────────────────────
      '<div>',
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">',
          '<a href="tasks.html" class="btn btn-secondary btn-sm">← Back</a>',
          '<span style="color:var(--text-muted);font-family:monospace;font-size:12px">#'+task.id+'</span>',
        '</div>',

        '<div class="task-detail-header">',
          '<h1 class="task-detail-title">'+_esc(task.title)+'</h1>',
          '<div class="task-detail-meta">',
            statusBadge(task.status),
            priorityBadge(task.priority),
            '<div class="task-meta-item">📅 '+formatDate(task.dueDate)+'</div>',
            '<div class="task-meta-item">👤 '+_esc((task.assignedUser&&task.assignedUser.name)||(task.assignedTo&&task.assignedTo.name)||'Unassigned')+'</div>',
          '</div>',
        '</div>',

        task.description
          ? '<div class="task-description">'+_esc(task.description)+'</div>'
          : '',

        // Status buttons
        '<div class="card" style="margin-bottom:20px">',
          '<div class="card-header"><div class="card-header-title">🔄 Quick Status Update</div></div>',
          '<div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap;padding:14px 16px">',
            '<button class="btn btn-sm" id="sbtn-TODO"        onclick="updateStatus(\'TODO\')">⬜ Todo</button>',
            '<button class="btn btn-sm" id="sbtn-IN_PROGRESS" onclick="updateStatus(\'IN_PROGRESS\')">🔵 In Progress</button>',
            '<button class="btn btn-sm" id="sbtn-DONE"        onclick="updateStatus(\'DONE\')">✅ Done</button>',
          '</div>',
        '</div>',

        // Comments
        '<div class="card">',
          '<div class="card-header"><div class="card-header-title">💬 Comments</div></div>',
          '<div class="card-body">',
            '<div id="comments-list">'+renderComments(comments)+'</div>',
            '<div style="margin-top:16px;border-top:1px solid var(--border-color);padding-top:16px">',
              '<textarea id="new-comment" class="form-control" rows="2" placeholder="Add a comment…" style="margin-bottom:10px"></textarea>',
              '<button class="btn btn-primary btn-sm" onclick="addComment()">💬 Post Comment</button>',
            '</div>',
          '</div>',
        '</div>',
      '</div>',

      // ── Right Column ───────────────────────────────────
      '<div>',
        '<div class="card" style="position:sticky;top:78px">',
          '<div class="card-header"><div class="card-header-title">📜 Activity Log</div></div>',
          '<div class="card-body" style="max-height:580px;overflow-y:auto;padding:12px 16px">',
            '<div id="activity-timeline"><div class="loading-spinner"><div class="spinner"></div></div></div>',
          '</div>',
        '</div>',
      '</div>',

      '</div>'  // detail-grid
    ].join('');

    highlightStatus(task.status);
    Activity.load(taskId);
  }

  function renderComments(list) {
    if (!list || !list.length) return '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">💬 No comments yet. Be the first!</div>';
    return list.map(function(c) {
      var name = (c.author&&c.author.name)||(c.createdBy&&c.createdBy.name)||'User';
      return '<div class="comment-item">'+
        '<div class="comment-avatar">'+getInitials(name)+'</div>'+
        '<div class="comment-body">'+
          '<div class="comment-meta"><strong>'+_esc(name)+'</strong> · '+timeAgo(c.createdAt)+'</div>'+
          '<div class="comment-text">'+_esc(c.content||c.text||'')+'</div>'+
        '</div></div>';
    }).join('');
  }

  function highlightStatus(current) {
    ['TODO','IN_PROGRESS','DONE'].forEach(function(s) {
      var btn = document.getElementById('sbtn-'+s);
      if (!btn) return;
      if (s === current) {
        btn.className = 'btn btn-primary btn-sm';
      } else {
        btn.className = 'btn btn-secondary btn-sm';
      }
    });
  }

  async function updateStatus(newStatus) {
    var result = await Api.updateTaskStatus(taskId, newStatus);
    if (result) {
      Toast.success('Status updated to ' + newStatus.replace('_',' '));
      highlightStatus(newStatus);
      Activity.load(taskId);
    }
  }

  async function addComment() {
    var el = document.getElementById('new-comment');
    var content = el.value.trim();
    if (!content) { Toast.warning('Please enter a comment.'); return; }
    var result = await Api.addComment(taskId, content);
    if (result) {
      el.value = '';
      Toast.success('Comment added!');
      var comments = await Api.getComments(taskId);
      document.getElementById('comments-list').innerHTML = renderComments(comments||[]);
      Activity.load(taskId);
    }
  }

  window.updateStatus = updateStatus;
  window.addComment   = addComment;

  loadDetail();
</script>

<style>
  @media (max-width: 900px) {
    #detail-grid { grid-template-columns: 1fr !important; }
  }
</style>
</body>
</html>
