<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Team</title>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <div class="filter-bar" style="margin-bottom:20px">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="user-search" class="form-control" placeholder="Search team members…" />
        </div>
        <select id="role-filter" class="form-select" style="width:160px;flex:none">
          <option value="">All Roles</option>
          <option value="ADMIN">Admin</option>
          <option value="MANAGER">Manager</option>
          <option value="DEVELOPER">Developer</option>
        </select>
      </div>

      <div id="users-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
        <div class="loading-spinner" style="grid-column:1/-1"><div class="spinner"></div> Loading team…</div>
      </div>

    </div>
  </div>
</div>
<!-- CHANGE ROLE MODAL -->
<div
  class="modal fade"
  id="role-modal"
  tabindex="-1"
  aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Change User Role
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <div style="margin-bottom:14px">

          <div
            style="
              font-size:12px;
              color:var(--text-muted);
              margin-bottom:6px">
            USER
          </div>

          <div
            id="role-user-name"
            style="
              font-size:15px;
              font-weight:700">
          </div>

        </div>

        <label class="form-label">
          Select Role
        </label>

        <select
          id="role-select"
          class="form-select">

          <option value="ADMIN">
            Admin
          </option>

          <option value="MANAGER">
            Manager
          </option>

          <option value="DEVELOPER">
            Developer
          </option>

        </select>

      </div>

      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal">

          Cancel

        </button>

        <button
          type="button"
          class="btn btn-primary"
          id="save-role-btn">

          Save Changes

        </button>

      </div>

    </div>

  </div>

</div>
<script src="js/shell.js"></script>
<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if (!initPage('users', 'Team')) { throw new Error('Not authenticated'); }
  

  var allUsers = [];
 var selectedUserId = null;
var roleModal = null;
  var currentUser = Api.getUser();

function isAdmin() {
  var role = (
    currentUser?.role?.name ||
    currentUser?.role ||
    (currentUser?.roles && currentUser.roles[0]) ||
    ''
  ).toString().toUpperCase();

  return role === 'ADMIN';
}

  async function loadUsers() {
    var data = await Api.getUsers();
    allUsers = data || [];
    renderUsers(allUsers);
  }

  function renderUsers(list) {
    var grid = document.getElementById('users-grid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">👥</div><h6>No team members found</h6></div>';
      return;
    }
    grid.innerHTML = list.map(function(u) {
      var initials = (u.name||'U').split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
var role = (
  u.role?.name ||
  u.role ||
  (u.roles && u.roles[0]) ||
  'DEVELOPER'
).toString().toUpperCase();
      return '<div class="user-card">'+
        '<div class="user-card-avatar">'+initials+'</div>'+
        '<div class="user-card-name">'+_esc(u.name)+'</div>'+
        '<div class="user-card-email">'+_esc(u.email)+'</div>'+
        roleBadge(role) +

(isAdmin() ? `
  <div style="margin-top:12px">
    <button
      class="btn btn-primary btn-sm w-100"
      onclick="changeRolePrompt(
  '${u.id}',
  '${u.name}',
  '${role}'
)">
      Change Role
    </button>
  </div>
` : '') +

'</div>';
    }).join('');
  }

  function filterUsers() {
    var search = document.getElementById('user-search').value.toLowerCase();
    var role   = document.getElementById('role-filter').value.toUpperCase();
    renderUsers(allUsers.filter(function(u) {
      var matchSearch = !search || (u.name||'').toLowerCase().includes(search) || (u.email||'').toLowerCase().includes(search);
      var userRole    = ((u.role||(u.roles&&u.roles[0])||'')).toString().toUpperCase();
      var matchRole   = !role || userRole === role;
      return matchSearch && matchRole;
    }));
  }
   function changeRolePrompt(userId, userName, currentRole) {

  selectedUserId = userId;

  document.getElementById(
    'role-user-name'
  ).textContent = userName;

  document.getElementById(
    'role-select'
  ).value = currentRole;

  if (!roleModal) {

    roleModal =
      bootstrap.Modal.getOrCreateInstance(
        document.getElementById('role-modal')
      );
  }

  roleModal.show();
}
document
  .getElementById('save-role-btn')
  .addEventListener('click', async function() {

    if (!selectedUserId) {
      return;
    }

    var newRole =
      document.getElementById(
        'role-select'
      ).value;

    var btn = this;

    btn.disabled = true;
    btn.innerHTML = 'Saving...';

    var result =
      await Api.changeUserRole(
        selectedUserId,
        newRole
      );

    btn.disabled = false;
    btn.innerHTML = 'Save Changes';

    if (result) {

      Toast.success(
        'Role updated successfully'
      );

      roleModal.hide();

      loadUsers();

    } else {

      Toast.error(
        'Failed to update role'
      );
    }
  });
  document.getElementById('user-search').addEventListener('input', debounce(filterUsers, 300));
  document.getElementById('role-filter').addEventListener('change', filterUsers);

  loadUsers();
</script>

</body>
</html>
