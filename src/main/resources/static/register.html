<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Register</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    :root{--bg-primary:#0d1117;--bg-card:#1c2128;--bg-tertiary:#21262d;--border-color:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--accent-blue:#388bfd;--accent-blue-dim:#1f6feb;--accent-purple:#a371f7;--accent-red:#f85149;--accent-green:#3fb950;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--shadow-lg:0 8px 24px rgba(0,0,0,.6);--transition:.18s cubic-bezier(.4,0,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:14px}
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .auth-wrapper::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(56,139,253,.08) 0%,transparent 70%);top:-200px;left:-200px;border-radius:50%;pointer-events:none}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-xl);padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:var(--shadow-lg)}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px}
    .auth-logo-text{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-title{font-size:24px;font-weight:700;margin-bottom:6px}
    .auth-subtitle{color:var(--text-secondary);margin-bottom:28px;font-size:13px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .form-control{display:block;width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:var(--radius-md);padding:10px 14px;font-family:inherit;font-size:14px;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
    .form-control:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(56,139,253,.15)}
    .form-control::placeholder{color:var(--text-muted)}
    .mb-3{margin-bottom:16px}.mb-4{margin-bottom:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:600;font-size:13px;border-radius:var(--radius-md);padding:8px 16px;transition:all var(--transition);border:1px solid transparent;cursor:pointer;text-decoration:none}
    .btn-primary{background:var(--accent-blue-dim);border-color:var(--accent-blue);color:#fff}
    .btn-primary:hover{background:var(--accent-blue);box-shadow:0 0 12px rgba(56,139,253,.3)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-lg{padding:12px 24px;font-size:15px}.w-100{width:100%}
    .alert-box{border-radius:var(--radius-md);padding:10px 14px;margin-bottom:16px;font-size:13px;display:none}
    .alert-error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--accent-red)}
    .alert-success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--accent-green)}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <span class="auth-logo-text">TaskFlow</span>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Join your team's workspace</p>

    <div class="alert-box alert-error" id="error-alert"></div>
    <div class="alert-box alert-success" id="success-alert"></div>

    <div class="mb-3">
      <label class="form-label" for="name">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="John Doe" autocomplete="name" />
    </div>
    <div class="mb-3">
      <label class="form-label" for="email">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="mb-4">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" />
    </div>
     <div class="mb-4">
  <label class="form-label" for="role">Role</label>
  <select id="role" class="form-control">
    <option value="DEVELOPER">Developer</option>
    <option value="MANAGER">Manager</option>
    <option value="ADMIN">Admin</option>
  </select>
</div>
    <button class="btn btn-primary btn-lg w-100" id="register-btn">Create Account</button>

    <div style="margin-top:20px;text-align:center;font-size:13px;color:var(--text-muted)">
      Already have an account?
      <a href="index.html" style="color:var(--accent-blue);font-weight:600;text-decoration:none;margin-left:4px">Sign in</a>
    </div>
  </div>
</div>

<script>
var API_BASE = 'https://task-manager-pj2c.onrender.com/api';
var Api = {
  getToken: function(){ return localStorage.getItem('jwt_token'); },
  isAuthenticated: function(){ return !!this.getToken(); },
  register: async function(name, email, password, role) {
    try {
      var res = await fetch(API_BASE+'/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name:name, email:email, password:password, role: role })
      });
      var data = await res.json().catch(function(){ return {}; });
      if (!res.ok) return {error: data.message || data.error || 'Registration failed'};
      return data;
    } catch(e) {
      return {error: 'Network error — is the backend running on localhost:8080?'};
    }
  }
};

if (Api.isAuthenticated()) { window.location.href = 'dashboard.html'; }

var registerBtn = document.getElementById('register-btn');

function showError(msg) {
  var el = document.getElementById('error-alert');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success-alert').style.display = 'none';
}
function showSuccess(msg) {
  var el = document.getElementById('success-alert');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-alert').style.display = 'none';
}
function setLoading(on) {
  registerBtn.disabled = on;
  registerBtn.innerHTML = on
    ? '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px"></span>Creating…'
    : 'Create Account';
}

async function doRegister() {
  document.getElementById('error-alert').style.display = 'none';
  document.getElementById('success-alert').style.display = 'none';
  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var role = document.getElementById('role').value;
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

  setLoading(true);
  var data = await Api.register(name, email, password, role);
  setLoading(false);

  if (data && data.error) { showError(data.error); return; }
  showSuccess('Account created! Redirecting to login…');
  setTimeout(function(){ window.location.href = 'index.html'; }, 1500);
}

registerBtn.addEventListener('click', doRegister);
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doRegister(); });
</script>
</body>
</html>
