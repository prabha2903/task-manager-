version: "3.8"

services:

  db:
    image: mysql:8
    container_name: taskmanager-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_management_db
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: taskmanager-app
    restart: always

    depends_on:
      - db

    ports:
      - "8080:8080"

    environment:
      DB_USERNAME: taskuser
      DB_PASSWORD: taskpass
      JWT_SECRET: mysecuresecretkey123456789

      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/task_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

volumes:
  db_data: